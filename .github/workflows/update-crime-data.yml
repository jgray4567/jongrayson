name: Update Pittsburgh Crime Data

on:
  schedule:
    - cron: '0 8 * * *' # Runs daily at 8:00 AM UTC (4:00 AM EDT)
  workflow_dispatch: # Allows you to run it manually

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Crime Scraper
        run: python intel/scripts/scrape_crimes.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add intel/data/pittsburgh/daily_crimes.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update daily crime data" && git push)

      - name: Deploy JSON to DreamHost
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./intel/data/pittsburgh/
          server-dir: ./jongrayson.com/intel/data/pittsburgh/
